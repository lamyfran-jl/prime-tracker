<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRIME Sport Santé — Suivi Investissements</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#f1f5f9;--white:#fff;--border:#e2e8f0;--border2:#cbd5e1;
      --text:#0f172a;--text2:#334155;--text3:#64748b;
      --accent:#1e40af;--accent-bg:#eff6ff;
      --row-hover:#f0f7ff;
      --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.08);
      --radius:8px;--font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
      --ok:#15803d;--ok-bg:#f0fdf4;--warn:#b45309;--warn-bg:#fffbeb;
      --danger:#b91c1c;--danger-bg:#fef2f2;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13.5px}

    /* HEADER */
    header{background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--shadow);position:sticky;top:0;z-index:100}
    .hinner{max-width:1500px;margin:auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:16px}
    .logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .logo-name{font-weight:700;font-size:15px}.logo-sub{font-size:11px;color:var(--text3)}
    .hsep{flex:1}
    .last-sync{font-size:11px;color:var(--text3)}
    .sync-btn{display:flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--border2);color:var(--text2);padding:7px 14px;border-radius:6px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;transition:all .15s}
    .sync-btn:hover{border-color:var(--accent);color:var(--accent)}.sync-btn:disabled{opacity:.5;cursor:not-allowed}
    .gtotal-label{font-size:11px;color:var(--text3);text-align:right}
    .gtotal-val{font-size:20px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
    .gtotal-ttc{font-size:11px;color:var(--text3)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinning{animation:spin .8s linear infinite;display:inline-block}

    .content{max-width:1500px;margin:auto;padding:20px 24px 48px}

    /* CARDS */
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:20px}
    .card{background:var(--white);border:1px solid var(--border);border-top:3px solid var(--cc);border-radius:var(--radius);padding:14px 16px;cursor:pointer;box-shadow:var(--shadow);transition:all .15s}
    .card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}.card.active{box-shadow:0 0 0 2px var(--cc)}
    .card-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
    .card-amt{font-size:19px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
    .card-ttc{font-size:11px;color:var(--text3);margin-bottom:8px}
    .card-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:8px;overflow:hidden}
    .card-bar-fill{height:100%;background:var(--cc);border-radius:2px;transition:width .5s}
    .badges{display:flex;gap:4px;flex-wrap:wrap}
    .badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:100px}
    .ba{background:#f1f5f9;color:#64748b}.bc{background:var(--ok-bg);color:var(--ok)}
    .bl{background:var(--warn-bg);color:var(--warn)}.bv{background:#dcfce7;color:#15803d}
    .bn{background:var(--danger-bg);color:var(--danger)}

    /* TABS */
    .tabs{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;overflow-x:auto;margin-bottom:16px}
    .tab{padding:12px 18px;font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:8px;transition:all .15s;user-select:none}
    .tab:hover{color:var(--text2);background:var(--bg)}.tab.active{color:var(--tc);border-bottom-color:var(--tc)}
    .tdot{width:8px;height:8px;border-radius:50%;background:var(--tc)}.tamt{font-size:11px;font-weight:400;color:var(--text3)}

    /* TABLE */
    .tcard{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .thead-bar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .thead-title{font-size:15px;font-weight:700}
    .totals{margin-left:auto;display:flex;gap:24px}
    .tot-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
    .tot-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
    .twrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:1000px}
    thead th{background:#f8fafc;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);padding:9px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
    th.r,td.r{text-align:right}th.c,td.c{text-align:center}
    tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:nth-child(even){background:#fafbfd}
    tbody tr:hover{background:var(--row-hover)!important}
    td{padding:9px 12px;color:var(--text2);font-size:13px;vertical-align:middle}
    td.desig{color:var(--text);font-weight:500}td.r{font-family:var(--mono);font-size:12px}td.dim{color:var(--text3)}

    tr.sec td{background:#f1f5f9;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);border-top:1px solid var(--border2);padding:7px 12px}
    tr.sec td.r{font-family:var(--mono);color:var(--text)}
    tr.sub td{background:#f8fafc;font-size:12px;font-weight:600;color:var(--text2);border-top:1px solid var(--border);font-style:italic}
    tr.sub td.r{font-family:var(--mono);color:var(--text);font-style:normal}
    tr.gtot td{background:var(--accent);color:#fff;font-weight:700;font-size:13px;border-top:2px solid #1e3a8a}
    tr.gtot td.r{font-family:var(--mono);color:#fff}

    /* ADD ROW */
    tr.add-row td{padding:0;border-top:none}
    .add-btn{display:flex;align-items:center;gap:6px;width:100%;padding:7px 12px;background:none;border:none;color:var(--text3);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;text-align:left}
    .add-btn:hover{background:var(--accent-bg);color:var(--accent)}

    /* ADD FORM */
    tr.form-row td{background:#f0f7ff;padding:8px 12px;border-top:1px dashed #93c5fd}
    .form-row input,.form-row select{font-family:var(--font);font-size:12px;background:var(--white);border:1px solid var(--border2);border-radius:4px;padding:4px 7px;color:var(--text);outline:none;width:100%}
    .form-row input:focus,.form-row select:focus{border-color:var(--accent)}
    .form-row input[type=number]{font-family:var(--mono)}
    .form-actions{display:flex;gap:6px;justify-content:flex-end}
    .btn-save{background:var(--accent);color:#fff;border:none;border-radius:5px;padding:5px 14px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer}
    .btn-save:hover{background:#1e3a8a}.btn-save:disabled{opacity:.5;cursor:not-allowed}
    .btn-cancel{background:var(--white);color:var(--text3);border:1px solid var(--border2);border-radius:5px;padding:5px 12px;font-family:var(--font);font-size:12px;cursor:pointer}
    .btn-cancel:hover{color:var(--text);border-color:var(--text3)}

    /* EDITABLE */
    .ed{display:inline-block;cursor:text;border-radius:4px;padding:2px 4px;margin:-2px -4px;transition:background .1s;min-width:20px}
    .ed:hover{background:#dbeafe;outline:1px dashed #93c5fd}
    .einput{font-family:var(--mono);font-size:12px;background:#fff;border:2px solid var(--accent);border-radius:4px;padding:2px 6px;outline:none;color:var(--text);width:100%}

    /* STATUT */
    .ss{appearance:none;border:none;background:transparent;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;outline:none;padding:3px 8px;border-radius:100px;width:100%}
    .sa{background:#f1f5f9;color:#64748b}.sc{background:var(--ok-bg);color:var(--ok)}
    .sl{background:var(--warn-bg);color:var(--warn)}.sv{background:#dcfce7;color:#15803d}
    .sn{background:var(--danger-bg);color:var(--danger)}

    /* BON DE COMMANDE */
    .bc-cell{display:flex;align-items:center;justify-content:center;gap:6px}

    .pdf-link{display:inline-flex;align-items:center;gap:4px;background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;border-radius:5px;padding:3px 8px;font-size:11px;font-weight:600;text-decoration:none;transition:all .15s;white-space:nowrap}
    .pdf-link:hover{background:#fecaca;border-color:#f87171}
    .pdf-link svg{flex-shrink:0}

    .upload-btn{display:inline-flex;align-items:center;gap:4px;background:var(--white);color:var(--text3);border:1px dashed var(--border2);border-radius:5px;padding:3px 8px;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--font)}
    .upload-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
    .upload-btn:disabled{opacity:.4;cursor:not-allowed}

    .uploading{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--warn);font-weight:500}

    /* LOADING/ERROR */
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:16px}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    .loading-txt{font-size:13px;color:var(--text3)}
    .errbox{background:var(--danger-bg);border:1px solid #fca5a5;border-radius:var(--radius);padding:20px 24px;color:var(--danger);font-size:13px;line-height:1.7}
    .errbox code{font-family:var(--mono);background:rgba(185,28,28,.08);padding:1px 5px;border-radius:3px}

    #toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:var(--shadow-md);opacity:0;transform:translateY(6px);transition:all .2s;z-index:9999;max-width:300px}
    #toast.show{opacity:1;transform:translateY(0)}
    #toast.success{background:var(--ok-bg);color:var(--ok);border:1px solid #86efac}
    #toast.error{background:var(--danger-bg);color:var(--danger);border:1px solid #fca5a5}
    #toast.saving{background:var(--warn-bg);color:var(--warn);border:1px solid #fcd34d}

    /* hidden file input */
    #fileInput{display:none}
  </style>
</head>
<body>
<header>
  <div class="hinner">
    <div class="logo-icon">PS</div>
    <div><div class="logo-name">PRIME Sport Santé</div><div class="logo-sub">Suivi des investissements — JL PRIME</div></div>
    <div class="hsep"></div>
    <span class="last-sync" id="lastSync"></span>
    <button class="sync-btn" id="syncBtn" onclick="loadData()"><span id="syncIcon">↻</span> Actualiser</button>
    <div><div class="gtotal-label">Total général HT</div><div class="gtotal-val" id="gHT">—</div><div class="gtotal-ttc" id="gTTC"></div></div>
  </div>
</header>

<!-- Hidden file input for PDF upload -->
<input type="file" id="fileInput" accept=".pdf,.PDF" />

<div class="content"><div id="app">
  <div class="loading"><div class="spinner"></div><div class="loading-txt">Chargement depuis Google Sheets…</div></div>
</div></div>
<div id="toast"></div>

<script>
const TABS=[
  {key:'back',    label:'PRIME BACK',       color:'#2563eb'},
  {key:'fit',     label:'PRIME FIT',         color:'#16a34a'},
  {key:'well',    label:'PRIME WELL',        color:'#7c3aed'},
  {key:'mobilier',label:'MOBILIER',          color:'#d97706'},
  {key:'av',      label:'INFO & AV',         color:'#0891b2'},
  {key:'agm',     label:'AGM CONSTRUCTIONS', color:'#dc2626'},
];
const STATUTS=[
  {v:'En attente',           sc:'sa',bc:'ba'},
  {v:'Commandé',             sc:'sc',bc:'bc'},
  {v:'En cours de livraison',sc:'sl',bc:'bl'},
  {v:'Livré',                sc:'sv',bc:'bv'},
  {v:'Annulé',               sc:'sn',bc:'bn'},
];
let appData=null,activeTab='back',saving=false;

const fmt=(n,d=0)=>n==null||isNaN(n)?'—':
  new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:d,maximumFractionDigits:d}).format(n);
const stCls=s=>STATUTS.find(x=>x.v===s)?.sc||'sa';
const bdCls=s=>STATUTS.find(x=>x.v===s)?.bc||'ba';

function toast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`show ${type}`;
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='',3500);
}

function counts(tab){
  const c={};
  (tab.sections||[]).forEach(s=>s.items.forEach(i=>{c[i.statut]=(c[i.statut]||0)+1;}));
  return c;
}
function statOpts(sel='En attente'){
  return STATUTS.map(s=>`<option value="${s.v}"${sel===s.v?' selected':''}>${s.v}</option>`).join('');
}

// ── BON DE COMMANDE CELL ──
function bcCell(item,si,ii,sheetName,rowIndex){
  if(item.bon_commande){
    return `<div class="bc-cell">
      <a class="pdf-link" href="${item.bon_commande}" target="_blank" rel="noopener">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <rect x="1" y="1" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M3.5 7.5h5M3.5 5.5h5M3.5 3.5h3" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
        </svg>
        PDF
      </a>
      <button class="upload-btn" title="Remplacer" onclick="triggerUpload(${si},${ii},'${sheetName}',${rowIndex},this)">↺</button>
    </div>`;
  }
  return `<div class="bc-cell">
    <button class="upload-btn" onclick="triggerUpload(${si},${ii},'${sheetName}',${rowIndex},this)">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
        <path d="M5.5 7.5V2M3 4.5L5.5 2 8 4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M1.5 8.5v1a.5.5 0 00.5.5h7a.5.5 0 00.5-.5v-1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Upload
    </button>
  </div>`;
}

// ── UPLOAD TRIGGER ──
let pendingUpload=null;

function triggerUpload(si,ii,sheetName,rowIndex,btn){
  pendingUpload={si,ii,sheetName,rowIndex,btn};
  const inp=document.getElementById('fileInput');
  inp.value='';
  inp.onchange=handleFileSelected;
  inp.click();
}

async function handleFileSelected(e){
  const file=e.target.files[0];
  if(!file||!pendingUpload) return;
  const {si,ii,sheetName,rowIndex,btn}=pendingUpload;

  // Show uploading state
  const cell=btn.closest('.bc-cell');
  cell.innerHTML=`<span class="uploading"><span class="spinning">↻</span> Upload…</span>`;
  toast('Upload en cours…','saving');

  try{
    const base64=await fileToBase64(file);
    const res=await fetch('/api/drive-upload',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        sheet_name:sheetName,
        row_index:rowIndex,
        file_name:file.name,
        file_data:base64,
        mime_type:file.type||'application/pdf',
      })
    });
    const data=await res.json();
    if(data.success){
      // Update local state
      appData.tabs[activeTab].sections[si].items[ii].bon_commande=data.view_link;
      toast('✓ Bon de commande uploadé','success');
      render();
    } else {
      toast(`✗ ${data.error}`,'error');
      render();
    }
  } catch(err){
    toast(`✗ ${err.message}`,'error');
    render();
  }
  pendingUpload=null;
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

// ── RENDER ──
function render(){
  if(!appData) return;
  const tab=appData.tabs[activeTab];
  const meta=TABS.find(t=>t.key===activeTab);

  const cards=TABS.map(t=>{
    const td=appData.tabs[t.key];if(!td) return '';
    const pct=appData.grand_total_ht>0?td.total_ht/appData.grand_total_ht*100:0;
    const cc=counts(td);
    const badges=Object.entries(cc).map(([s,n])=>
      `<span class="badge ${bdCls(s)}">${n} ${s==='En cours de livraison'?'livr.':s.toLowerCase()}</span>`
    ).join('');
    return `<div class="card ${t.key===activeTab?'active':''}" style="--cc:${t.color}" onclick="switchTab('${t.key}')">
      <div class="card-lbl">${t.label}</div>
      <div class="card-amt">${fmt(td.total_ht)}</div>
      <div class="card-ttc">${fmt(td.total_ttc)} TTC</div>
      <div class="card-bar"><div class="card-bar-fill" style="width:${pct.toFixed(1)}%"></div></div>
      <div class="badges">${badges}</div>
    </div>`;
  }).join('');

  const tabsHtml=TABS.map(t=>{
    const td=appData.tabs[t.key];
    return `<div class="tab ${t.key===activeTab?'active':''}" style="--tc:${t.color}" onclick="switchTab('${t.key}')">
      <span class="tdot"></span>${t.label}<span class="tamt">${td?fmt(td.total_ht):'—'}</span>
    </div>`;
  }).join('');

  let rows='';
  if(tab?.sections?.length){
    tab.sections.forEach((sec,si)=>{
      const sHT=sec.items.reduce((a,i)=>a+(i.total_ht||0),0);
      const sTTC=sec.items.reduce((a,i)=>a+(i.total_ttc||0),0);
      rows+=`<tr class="sec">
        <td colspan="8">▸ ${sec.name}</td>
        <td class="r">${fmt(sHT)}</td><td class="r">${fmt(sTTC)}</td>
      </tr>`;

      sec.items.forEach((item,ii)=>{
        rows+=`<tr data-tab="${activeTab}" data-si="${si}" data-ii="${ii}" data-row="${item.row_index}" data-sheet="${tab.sheet_name}">
          <td class="desig"><span class="ed" data-field="designation" onclick="startEdit(this,event)">${item.designation||'—'}</span></td>
          <td class="r"><span class="ed" data-field="qty" onclick="startEdit(this,event)">${item.qty??'—'}</span></td>
          <td class="r"><span class="ed" data-field="prix_ht" onclick="startEdit(this,event)">${item.prix_ht!=null?fmt(item.prix_ht):'—'}</span></td>
          <td class="r"><span class="ed" data-field="prix_ttc" onclick="startEdit(this,event)">${item.prix_ttc!=null?fmt(item.prix_ttc):'—'}</span></td>
          <td class="r"><span class="ed" data-field="total_ht" onclick="startEdit(this,event)">${item.total_ht!=null?fmt(item.total_ht):'—'}</span></td>
          <td class="r"><span class="ed" data-field="total_ttc" onclick="startEdit(this,event)">${item.total_ttc!=null?fmt(item.total_ttc):'—'}</span></td>
          <td><span class="ed" data-field="fournisseur" onclick="startEdit(this,event)">${item.fournisseur||'—'}</span></td>
          <td><select class="ss ${stCls(item.statut)}" onchange="onStatut(this)">${statOpts(item.statut)}</select></td>
          <td class="c">${bcCell(item,si,ii,tab.sheet_name,item.row_index)}</td>
          <td><span class="ed" data-field="date_livraison" onclick="startEdit(this,event)">${item.date_livraison||'—'}</span></td>
        </tr>`;
      });

      const lastRow=sec.items.length>0?sec.items[sec.items.length-1].row_index:-1;
      rows+=`<tr class="add-row">
        <td colspan="10">
          <button class="add-btn" onclick="showAddForm(this,${si},${lastRow},'${tab.sheet_name}')">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="currentColor"/><path d="M7 4v6M4 7h6" stroke="currentColor" stroke-linecap="round"/></svg>
            Ajouter un équipement dans "${sec.name}"
          </button>
        </td>
      </tr>`;

      rows+=`<tr class="sub">
        <td colspan="8" style="padding-left:20px">Sous-total — ${sec.name}</td>
        <td class="r">${fmt(sHT)}</td><td class="r">${fmt(sTTC)}</td>
      </tr>`;
    });

    rows+=`<tr class="gtot">
      <td colspan="8">TOTAL — ${meta?.label}</td>
      <td class="r">${fmt(tab.total_ht)}</td><td class="r">${fmt(tab.total_ttc)}</td>
    </tr>`;
  } else {
    rows=`<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text3)">Aucune donnée</td></tr>`;
  }

  document.getElementById('app').innerHTML=`
    <div class="cards">${cards}</div>
    <div class="tabs">${tabsHtml}</div>
    <div class="tcard">
      <div class="thead-bar">
        <div class="thead-title" style="color:${meta?.color}">${meta?.label}</div>
        ${tab?.error?`<span style="color:var(--danger);font-size:12px">⚠ ${tab.error}</span>`:''}
        <div class="totals">
          <div><div class="tot-lbl">Total HT</div><div class="tot-val">${fmt(tab?.total_ht)}</div></div>
          <div><div class="tot-lbl">Total TTC</div><div class="tot-val">${fmt(tab?.total_ttc)}</div></div>
        </div>
      </div>
      <div class="twrap">
        <table>
          <thead><tr>
            <th style="width:22%">Désignation</th>
            <th class="r" style="width:4%">Qté</th>
            <th class="r" style="width:8%">PU HT</th>
            <th class="r" style="width:8%">PU TTC</th>
            <th class="r" style="width:8%">Total HT</th>
            <th class="r" style="width:8%">Total TTC</th>
            <th style="width:11%">Fournisseur</th>
            <th style="width:11%">Statut</th>
            <th class="c" style="width:8%">Bon de commande</th>
            <th style="width:8%">Livraison</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function switchTab(key){activeTab=key;render();}

// ── INLINE EDIT ──
const NUM_FIELDS=['prix_ht','prix_ttc','total_ht','total_ttc','qty'];

function startEdit(span,event){
  event.stopPropagation();
  if(span.querySelector('input')) return;
  const row=span.closest('tr');
  const field=span.dataset.field;
  const item=appData.tabs[activeTab].sections[+row.dataset.si].items[+row.dataset.ii];
  const isNum=NUM_FIELDS.includes(field);
  const cur=item[field];

  const inp=document.createElement('input');
  inp.className='einput';inp.type=isNum?'number':'text';inp.value=cur??'';
  if(isNum){inp.step='0.01';inp.min='0';}
  span.innerHTML='';span.appendChild(inp);
  inp.focus();inp.select();

  const commit=()=>{
    const raw=inp.value.trim();
    const newVal=isNum?(raw===''?null:parseFloat(raw.replace(',','.'))):(raw||null);
    item[field]=newVal;
    span.innerHTML=isNum?(newVal!=null?fmt(newVal):'—'):(newVal||'—');
    doSave(row,field,newVal??'');
    recompute();
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();commit();}
    if(e.key==='Escape') span.innerHTML=isNum?(cur!=null?fmt(cur):'—'):(cur||'—');
  });
}

function onStatut(sel){
  const row=sel.closest('tr');
  const item=appData.tabs[activeTab].sections[+row.dataset.si].items[+row.dataset.ii];
  item.statut=sel.value;
  sel.className=`ss ${stCls(sel.value)}`;
  doSave(row,'statut',sel.value);
}

// ── ADD ROW ──
function showAddForm(btn,si,afterRowIndex,sheetName){
  document.querySelectorAll('tr.form-row').forEach(r=>r.remove());
  document.querySelectorAll('.add-btn').forEach(b=>b.disabled=false);
  btn.disabled=true;
  const tr=btn.closest('tr');
  const formRow=document.createElement('tr');
  formRow.className='form-row';
  formRow.innerHTML=`
    <td><input type="text" id="f-desig" placeholder="Désignation *" required /></td>
    <td><input type="number" id="f-qty" placeholder="Qté" min="0" step="1" value="1" /></td>
    <td><input type="number" id="f-pu-ht" placeholder="PU HT" min="0" step="0.01" /></td>
    <td><input type="number" id="f-pu-ttc" placeholder="PU TTC" min="0" step="0.01" /></td>
    <td><input type="number" id="f-tot-ht" placeholder="Total HT" min="0" step="0.01" /></td>
    <td><input type="number" id="f-tot-ttc" placeholder="Total TTC" min="0" step="0.01" /></td>
    <td><input type="text" id="f-fourn" placeholder="Fournisseur" /></td>
    <td><select id="f-statut" class="ss sa">${statOpts()}</select></td>
    <td></td>
    <td>
      <div class="form-actions">
        <button class="btn-cancel" onclick="cancelAdd(this)">✕</button>
        <button class="btn-save" id="f-save" onclick="submitAdd(this,${si},${afterRowIndex},'${sheetName}')">Ajouter</button>
      </div>
    </td>`;
  tr.after(formRow);
  document.getElementById('f-desig').focus();
  document.getElementById('f-statut').addEventListener('change',function(){this.className=`ss ${stCls(this.value)}`;});
}

function cancelAdd(btn){
  btn.closest('tr').remove();
  document.querySelectorAll('.add-btn').forEach(b=>b.disabled=false);
}

async function submitAdd(btn,si,afterRowIndex,sheetName){
  const desig=document.getElementById('f-desig').value.trim();
  if(!desig){document.getElementById('f-desig').focus();return;}
  const row_data={
    designation:desig,
    qty:document.getElementById('f-qty').value||'',
    prix_ht:document.getElementById('f-pu-ht').value||'',
    prix_ttc:document.getElementById('f-pu-ttc').value||'',
    total_ht:document.getElementById('f-tot-ht').value||'',
    total_ttc:document.getElementById('f-tot-ttc').value||'',
    fournisseur:document.getElementById('f-fourn').value||'',
    statut:document.getElementById('f-statut').value||'En attente',
  };
  btn.disabled=true;btn.textContent='…';
  toast('Ajout en cours…','saving');
  try{
    const r=await fetch('/api/sheets-update',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'add_row',sheet_name:sheetName,after_row_index:afterRowIndex,row_data})
    });
    const d=await r.json();
    if(d.success){toast('✓ Équipement ajouté','success');await loadData();}
    else{toast(`✗ ${d.error}`,'error');btn.disabled=false;btn.textContent='Ajouter';}
  }catch(e){toast(`✗ ${e.message}`,'error');btn.disabled=false;btn.textContent='Ajouter';}
}

// ── SAVE ──
async function doSave(row,field,value){
  if(saving) return;saving=true;
  toast('Enregistrement…','saving');
  try{
    const r=await fetch('/api/sheets-update',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sheet_name:row.dataset.sheet,row_index:+row.dataset.row,field,value})
    });
    const d=await r.json();
    d.success?toast('✓ Enregistré','success'):toast(`✗ ${d.error}`,'error');
  }catch(e){toast(`✗ ${e.message}`,'error');}
  finally{saving=false;}
}

function recompute(){
  let gHT=0,gTTC=0;
  Object.values(appData.tabs).forEach(tab=>{
    tab.total_ht=0;tab.total_ttc=0;
    (tab.sections||[]).forEach(s=>s.items.forEach(i=>{tab.total_ht+=(i.total_ht||0);tab.total_ttc+=(i.total_ttc||0);}));
    gHT+=tab.total_ht;gTTC+=tab.total_ttc;
  });
  appData.grand_total_ht=gHT;appData.grand_total_ttc=gTTC;
  document.getElementById('gHT').textContent=fmt(gHT);
  document.getElementById('gTTC').textContent=fmt(gTTC)+' TTC';
}

async function loadData(){
  const btn=document.getElementById('syncBtn'),icon=document.getElementById('syncIcon');
  btn.disabled=true;icon.classList.add('spinning');
  try{
    const r=await fetch('/api/sheets-read');
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    appData=await r.json();
    document.getElementById('gHT').textContent=fmt(appData.grand_total_ht);
    document.getElementById('gTTC').textContent=fmt(appData.grand_total_ttc)+' TTC';
    document.getElementById('lastSync').textContent=
      'Sync '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    render();
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="errbox">
      <strong>Impossible de charger les données</strong><br>${e.message}<br><br>
      Vérifiez que les variables d'environnement Netlify sont correctement configurées :<br>
      <code>GOOGLE_SPREADSHEET_ID</code> et <code>GOOGLE_SERVICE_ACCOUNT_JSON</code>
    </div>`;
  }finally{btn.disabled=false;icon.classList.remove('spinning');}
}

loadData();
setInterval(loadData,5*60*1000);
</script>
